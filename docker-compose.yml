services:
  # DNS-VPN Gateway: DNS upstream + точечная маршрутизация через WG
  dns-vpn-gateway:
    image: ghcr.io/buger68/pi_vpn_split:latest
    # build: .   # раскомментируй для локальной сборки
    container_name: dns-vpn-gateway
    network_mode: host
    privileged: true
    entrypoint: ["python", "main.py"]
    environment:
      - DNS_PORT=5353
      - WEB_PORT=3001
      - WEB_HOST=0.0.0.0
      - VPN_INTERFACE=wg0
    volumes:
      - ./domains.json:/app/domains.json
      - /etc/wireguard:/etc/wireguard
    restart: unless-stopped

  # AdGuard Home: DNS-фильтрация (на порту :53, веб на :3000)
  adguard-home:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
    volumes:
      - ./adguard-work:/opt/adguardhome/work
      - ./adguard-conf:/opt/adguardhome/conf
    restart: unless-stopped